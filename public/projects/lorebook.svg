  <!-- main panel -->
  <text x="230" y="90" font-family="Space Grotesk, sans-serif" font-size="26" fill="#e9e2d4">Aelin Vorr</text>
  <text x="230" y="112" font-family="JetBrains Mono, monospace" font-size="11" fill="#635a4f">CHARACTER · LAST EDITED 3 DAYS AGO</text>
  <line x1="230" y1="128" x2="780" y2="128" stroke="#1f1a16"/>
  <g font-family="Space Grotesk, sans-serif" font-size="13" fill="#a39788">
    <text x="230" y="160">Cartographer of the Iron Coast. Once an apprentice to</text>
    <text x="230" y="180">the Salt Bishops; defected after the third Drowning.</text>
    <text x="230" y="200">Carries her father's quadrant — a brass instrument</text>
    <text x="230" y="220">that hums when ships sink within a league.</text>
  </g>
  <!-- AI suggestion bubble -->
  <rect x="230" y="260" width="540" height="78" fill="#1a1614" stroke="#d97a3a"/>
  <text x="248" y="282" font-family="JetBrains Mono, monospace" font-size="10" fill="#d97a3a">◆ LOREBOOK · CONSISTENCY CHECK</text>
